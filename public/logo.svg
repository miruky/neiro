<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="logo-title">
  <title id="logo-title">neiro — 信号の波形のロゴ</title>
  <style>
    .bg { fill: #f4f2ec; }
    .frame { stroke: #1c1b18; opacity: 0.14; }
    .wave { stroke: #2f43e0; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #131419; }
      .frame { stroke: #e9e7e0; }
      .wave { stroke: #8a97ff; }
    }
  </style>
  <rect class="bg" width="128" height="128" rx="28" />
  <rect class="frame" x="1" y="1" width="126" height="126" rx="27" fill="none" stroke-width="2" />
  <path
    class="wave"
    d="M18 64 H38 L50 28 L70 100 L84 50 L92 78 H110"
    fill="none"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
